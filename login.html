<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 星算纪</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        :root { --ocean-deep: #0a1628; --ocean-mid: #0d2137; --cyan-glow: #00e5ff; --purple-dream: #7c3aed; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'SF Pro Display', -apple-system, sans-serif; background: var(--ocean-deep); color: #ffffff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        .bg-animation { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
        .bg-animation::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 30% 20%, rgba(0, 229, 255, 0.08), transparent 60%), radial-gradient(ellipse at 70% 80%, rgba(124, 58, 237, 0.08), transparent 60%); }
        
        .login-card { position: relative; z-index: 10; background: rgba(13, 33, 55, 0.9); backdrop-filter: blur(30px); border: 1px solid rgba(0, 229, 255, 0.2); border-radius: 24px; padding: 3rem; width: 100%; max-width: 440px; box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5); }
        .logo { text-align: center; font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; }
        .logo span { background: linear-gradient(135deg, var(--cyan-glow), var(--purple-dream)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { text-align: center; color: rgba(255, 255, 255, 0.5); font-size: 0.95rem; margin-bottom: 2.5rem; }
        
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; color: rgba(255, 255, 255, 0.7); font-size: 0.9rem; margin-bottom: 0.5rem; font-weight: 500; }
        .form-group input { width: 100%; padding: 0.9rem 1.2rem; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(0, 229, 255, 0.15); border-radius: 12px; color: #ffffff; font-size: 1rem; transition: all 0.3s; }
        .form-group input:focus { outline: none; border-color: var(--cyan-glow); box-shadow: 0 0 20px rgba(0, 229, 255, 0.15); }
        .form-group input::placeholder { color: rgba(255, 255, 255, 0.3); }
        
        .btn-login { width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--cyan-glow), var(--purple-dream)); color: #000; border: none; border-radius: 12px; font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: all 0.3s; margin-top: 0.5rem; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0, 229, 255, 0.3); }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .error-msg { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 10px; padding: 0.8rem 1rem; color: #ef4444; font-size: 0.9rem; margin-bottom: 1.5rem; display: none; }
        .error-msg.show { display: block; }
        
        .switch-link { text-align: center; margin-top: 2rem; color: rgba(255, 255, 255, 0.5); font-size: 0.9rem; }
        .switch-link a { color: var(--cyan-glow); text-decoration: none; font-weight: 600; }
        .switch-link a:hover { text-decoration: underline; }
        
        .loading { display: none; text-align: center; padding: 1rem; color: rgba(255, 255, 255, 0.5); }
        .loading.show { display: block; }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <div class="login-card">
        <div class="logo">星算<span>纪</span></div>
        <div class="subtitle">登录您的账户</div>
        
        <div class="error-msg" id="error-msg"></div>
        <div class="loading" id="loading">登录中...</div>
        
        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="email" placeholder="you@email.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login" id="btn-login">登 录</button>
        </form>
        
        <div class="switch-link">
            还没有账户？<a href="register.html">立即注册</a>
        </div>
    </div>

    <script>
        // 如果已登录，直接跳转
        async function checkAuth() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                window.location.href = 'console.html';
            }
        }
        checkAuth();

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn-login');
            const errorMsg = document.getElementById('error-msg');
            const loading = document.getElementById('loading');

            errorMsg.classList.remove('show');
            btn.disabled = true;
            loading.classList.add('show');

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });

            loading.classList.remove('show');
            btn.disabled = false;

            if (error) {
                errorMsg.textContent = '登录失败：' + error.message;
                errorMsg.classList.add('show');
                return;
            }

            // 登录成功，跳转
            const urlParams = new URLSearchParams(window.location.search);
            const redirect = urlParams.get('redirect') || 'console.html';
            window.location.href = decodeURIComponent(redirect);
        }
    </script>
</body>
</html>
