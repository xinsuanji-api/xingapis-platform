<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 星算纪 API 平台</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #0a1628 0%, #0d2137 100%);
      color: #e2e8f0;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 229, 255, 0.2);
      border-radius: 16px;
      padding: 3rem;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 0 50px rgba(0, 229, 255, 0.2);
    }

    .logo {
      text-align: center;
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #00e5ff, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      text-align: center;
      color: #94a3b8;
      font-size: 1rem;
      margin-bottom: 2.5rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      color: #94a3b8;
      margin-bottom: 0.5rem;
      font-size: 0.95rem;
    }

    .form-input {
      width: 100%;
      padding: 0.9rem 1rem;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(0, 229, 255, 0.2);
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 1rem;
      transition: all 0.3s;
    }

    .form-input:focus {
      outline: none;
      border-color: #00e5ff;
      box-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
    }

    .btn-login {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #00e5ff, #7c3aed);
      color: white;
      border: none;
      border-radius: 25px;
      font-weight: 600;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 1rem;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(0, 229, 255, 0.4);
    }

    .btn-login:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      padding: 1rem;
      color: #ef4444;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }

    .success-message {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 8px;
      padding: 1rem;
      color: #22c55e;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }

    .links {
      text-align: center;
      margin-top: 2rem;
      color: #94a3b8;
      font-size: 0.95rem;
    }

    .links a {
      color: #00e5ff;
      text-decoration: none;
      transition: all 0.3s;
    }

    .links a:hover {
      color: #7c3aed;
      text-decoration: underline;
    }

    .loading {
      text-align: center;
      color: #94a3b8;
      margin-top: 1rem;
    }

    .password-toggle {
      position: relative;
    }

    .password-toggle button {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .password-toggle button:hover {
      color: #00e5ff;
    }

    @media (max-width: 768px) {
      .login-container {
        margin: 1rem;
        padding: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">🚀 星算纪 API 平台</div>
    <div class="subtitle">登录您的账户</div>

    <div id="error-message" class="error-message" style="display: none;"></div>
    <div id="success-message" class="success-message" style="display: none;"></div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="email">邮箱地址</label>
        <input type="email" class="form-input" id="email" placeholder="请输入邮箱" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">密码</label>
        <div class="password-toggle">
          <input type="password" class="form-input" id="password" placeholder="请输入密码" required>
          <button type="button" id="toggle-password">显示</button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="btn-login">登录</button>
    </form>

    <div class="loading" id="loading" style="display: none;">登录中...</div>

    <div class="links">
      <p>还没有账户？ <a href="/register">立即注册</a></p>
      <p style="margin-top: 1rem;"><a href="/forgot-password">忘记密码？</a></p>
    </div>
  </div>

  <script>
    // Supabase 配置（替换为您的配置）
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';

    // 初始化 Supabase 客户端
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // DOM 元素
    const loginForm = document.getElementById('login-form');
    const btnLogin = document.getElementById('btn-login');
    const errorMessage = document.getElementById('error-message');
    const successMessage = document.getElementById('success-message');
    const loading = document.getElementById('loading');
    const togglePassword = document.getElementById('toggle-password');
    const passwordInput = document.getElementById('password');

    // 显示/隐藏密码
    togglePassword.addEventListener('click', () => {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      togglePassword.textContent = type === 'password' ? '显示' : '隐藏';
    });

    // 登录表单提交
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      // 隐藏消息
      errorMessage.style.display = 'none';
      successMessage.style.display = 'none';

      // 禁用按钮
      btnLogin.disabled = true;
      loading.style.display = 'block';

      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email: email,
          password: password,
        });

        if (error) throw error;

        // 登录成功
        successMessage.textContent = '登录成功！正在跳转...';
        successMessage.style.display = 'block';

        // 跳转到控制台
        setTimeout(() => {
          window.location.href = '/console';
        }, 1000);

      } catch (error) {
        errorMessage.textContent = `登录失败：${error.message}`;
        errorMessage.style.display = 'block';
      } finally {
        btnLogin.disabled = false;
        loading.style.display = 'none';
      }
    });

    // 检查是否已经登录
    (async () => {
      const { data: { user } } = await supabase.auth.getUser();
      if (user) {
        // 已经登录，跳转到控制台
        window.location.href = '/console';
      }
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
</body>
</html>
