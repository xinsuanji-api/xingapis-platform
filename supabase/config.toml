# Supabase 配置文件

[project]
id = "xingapis-platform"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
port = 54321
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true
email_autoconfirm = true  # 测试环境自动确认邮箱

[auth.sms]
enabled = false

[auth.external.google]
enabled = false

[realtime]
enabled = true
port = 54321

[functions]
port = 54321

[analytics]
enabled = true
port = 54327
