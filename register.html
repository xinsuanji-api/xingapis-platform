<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 星算纪</title>

    <style>
        :root { --ocean-deep: #0a1628; --ocean-mid: #0d2137; --cyan-glow: #00e5ff; --purple-dream: #7c3aed; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'SF Pro Display', -apple-system, sans-serif; background: var(--ocean-deep); color: #ffffff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        .bg-animation { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
        .bg-animation::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 30% 20%, rgba(0, 229, 255, 0.08), transparent 60%), radial-gradient(ellipse at 70% 80%, rgba(124, 58, 237, 0.08), transparent 60%); }
        
        .register-card { position: relative; z-index: 10; background: rgba(13, 33, 55, 0.9); backdrop-filter: blur(30px); border: 1px solid rgba(0, 229, 255, 0.2); border-radius: 24px; padding: 3rem; width: 100%; max-width: 440px; box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5); }
        .logo { text-align: center; font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; }
        .logo span { background: linear-gradient(135deg, var(--cyan-glow), var(--purple-dream)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { text-align: center; color: rgba(255, 255, 255, 0.5); font-size: 0.95rem; margin-bottom: 2.5rem; }
        
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; color: rgba(255, 255, 255, 0.7); font-size: 0.9rem; margin-bottom: 0.5rem; font-weight: 500; }
        .form-group input { width: 100%; padding: 0.9rem 1.2rem; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(0, 229, 255, 0.15); border-radius: 12px; color: #ffffff; font-size: 1rem; transition: all 0.3s; }
        .form-group input:focus { outline: none; border-color: var(--cyan-glow); box-shadow: 0 0 20px rgba(0, 229, 255, 0.15); }
        .form-group input::placeholder { color: rgba(255, 255, 255, 0.3); }
        
        .bonus-tip { background: rgba(0, 255, 136, 0.05); border: 1px solid rgba(0, 255, 136, 0.2); border-radius: 10px; padding: 0.8rem 1rem; color: #00ff88; font-size: 0.9rem; margin-bottom: 1.5rem; text-align: center; }
        
        .btn-register { width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--cyan-glow), var(--purple-dream)); color: #000; border: none; border-radius: 12px; font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: all 0.3s; margin-top: 0.5rem; }
        .btn-register:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0, 229, 255, 0.3); }
        .btn-register:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .error-msg { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 10px; padding: 0.8rem 1rem; color: #ef4444; font-size: 0.9rem; margin-bottom: 1.5rem; display: none; }
        .error-msg.show { display: block; }
        
        .success-msg { background: rgba(0, 255, 136, 0.1); border: 1px solid rgba(0, 255, 136, 0.3); border-radius: 10px; padding: 1rem; color: #00ff88; font-size: 0.9rem; margin-bottom: 1.5rem; display: none; }
        .success-msg.show { display: block; }
        
        .loading { display: none; text-align: center; padding: 1rem; color: rgba(255, 255, 255, 0.5); }
        .loading.show { display: block; }
        
        .switch-link { text-align: center; margin-top: 2rem; color: rgba(255, 255, 255, 0.5); font-size: 0.9rem; }
        .switch-link a { color: var(--cyan-glow); text-decoration: none; font-weight: 600; }
        .switch-link a:hover { text-decoration: underline; }
        
        .terms { text-align: center; margin-top: 1.5rem; color: rgba(255, 255, 255, 0.3); font-size: 0.8rem; }
        .terms a { color: rgba(0, 229, 255, 0.5); text-decoration: none; }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <div class="register-card">
        <div class="logo">星算<span>纪</span></div>
        <div class="subtitle">创建您的账户</div>
        
        <div class="bonus-tip">🎉 注册即送 ¥10 体验金！</div>
        
        <div class="error-msg" id="error-msg"></div>
        <div class="success-msg" id="success-msg"></div>
        <div class="loading" id="loading">注册中...</div>
        
        <form id="register-form" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="email" placeholder="you@email.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label>密码（至少6位）</label>
                <input type="password" id="password" placeholder="设置登录密码" required autocomplete="new-password" minlength="6">
            </div>
            <div class="form-group">
                <label>确认密码</label>
                <input type="password" id="confirm-password" placeholder="再次输入密码" required autocomplete="new-password">
            </div>
            <button type="submit" class="btn-register" id="btn-register">创建账户</button>
        </form>
        
        <div class="switch-link">
            已有账户？<a href="login.html">立即登录</a>
        </div>
        
        <div class="terms">
            注册即表示同意 <a href="#">服务条款</a> 和 <a href="#">隐私政策</a>
        </div>
    </div>

    <script>
        function handleRegister(e) {
            e.preventDefault();
            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;
            var confirmPassword = document.getElementById('confirm-password').value;
            var btn = document.getElementById('btn-register');
            var errorMsg = document.getElementById('error-msg');
            var successMsg = document.getElementById('success-msg');
            var loading = document.getElementById('loading');

            // 隐藏之前的消息
            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');

            // 验证
            if (password !== confirmPassword) {
                errorMsg.textContent = '两次输入的密码不一致';
                errorMsg.classList.add('show');
                return;
            }
            if (password.length < 6) {
                errorMsg.textContent = '密码长度至少6位';
                errorMsg.classList.add('show');
                return;
            }

            // 检查是否已注册
            var users = JSON.parse(localStorage.getItem('xingsuanji_users') || '{}');
            if (users[email]) {
                errorMsg.textContent = '该邮箱已注册，请直接登录';
                errorMsg.classList.add('show');
                return;
            }

            btn.disabled = true;
            loading.classList.add('show');

            // 模拟注册
            setTimeout(function() {
                users[email] = { password: password, created_at: new Date().toISOString() };
                localStorage.setItem('xingsuanji_users', JSON.stringify(users));

                loading.classList.remove('show');
                btn.disabled = false;

                successMsg.textContent = '🎉 注册成功！即将跳转到登录页...';
                successMsg.classList.add('show');
                document.getElementById('register-form').reset();

                setTimeout(function() {
                    window.location.href = 'login.html?redirect=' + encodeURIComponent('console.html');
                }, 2000);
            }, 600);
        }
    </script>
</body>
</html>
